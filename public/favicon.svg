<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc2200"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0a0a0a"/>

  <!-- Head shape -->
  <ellipse cx="50" cy="44" rx="36" ry="34" fill="url(#faceGrad)"/>

  <!-- Brow ridge -->
  <ellipse cx="50" cy="25" rx="28" ry="10" fill="#222222"/>
  <rect x="22" y="20" width="56" height="12" rx="6" fill="#1a1a1a"/>

  <!-- Deep brow shadow -->
  <ellipse cx="50" cy="33" rx="30" ry="6" fill="#0d0d0d" opacity="0.8"/>

  <!-- Left eye -->
  <ellipse cx="34" cy="37" rx="8" ry="6" fill="#111"/>
  <ellipse cx="34" cy="37" rx="6" ry="5" fill="url(#eyeGlow)"/>
  <ellipse cx="34" cy="37" rx="3" ry="3" fill="#1a0000"/>
  <ellipse cx="32" cy="35.5" rx="1.2" ry="1" fill="white" opacity="0.6"/>

  <!-- Right eye -->
  <ellipse cx="66" cy="37" rx="8" ry="6" fill="#111"/>
  <ellipse cx="66" cy="37" rx="6" ry="5" fill="url(#eyeGlow)"/>
  <ellipse cx="66" cy="37" rx="3" ry="3" fill="#1a0000"/>
  <ellipse cx="64" cy="35.5" rx="1.2" ry="1" fill="white" opacity="0.6"/>

  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="10" ry="7" fill="#1a1a1a"/>
  <ellipse cx="44" cy="51" rx="4" ry="3.5" fill="#0d0d0d"/>
  <ellipse cx="56" cy="51" rx="4" ry="3.5" fill="#0d0d0d"/>

  <!-- Open mouth -->
  <path d="M28 62 Q50 58 72 62 Q70 80 50 82 Q30 80 28 62 Z" fill="#1a0000"/>
  <path d="M28 62 Q50 58 72 62" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Upper teeth -->
  <rect x="34" y="62" width="6" height="8" rx="2" fill="#cccccc"/>
  <rect x="42" y="61" width="5" height="9" rx="2" fill="#dddddd"/>
  <rect x="49" y="61" width="5" height="9" rx="2" fill="#dddddd"/>
  <rect x="56" y="61" width="5" height="9" rx="2" fill="#dddddd"/>
  <rect x="63" y="62" width="5" height="8" rx="2" fill="#cccccc"/>

  <!-- Fangs -->
  <path d="M31 63 L34 76 L37 63" fill="#bbbbbb"/>
  <path d="M63 63 L66 76 L69 63" fill="#bbbbbb"/>

  <!-- Lower teeth -->
  <rect x="38" y="72" width="5" height="7" rx="2" fill="#cccccc"/>
  <rect x="45" y="73" width="5" height="6" rx="2" fill="#cccccc"/>
  <rect x="52" y="73" width="5" height="6" rx="2" fill="#cccccc"/>
  <rect x="59" y="72" width="5" height="7" rx="2" fill="#cccccc"/>

  <!-- Cheek muscles / face details -->
  <path d="M16 40 Q22 35 26 45 Q20 50 16 48 Z" fill="#2a2a2a"/>
  <path d="M84 40 Q78 35 74 45 Q80 50 84 48 Z" fill="#2a2a2a"/>

  <!-- Fur texture lines -->
  <path d="M20 30 Q25 25 22 20" stroke="#333" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M80 30 Q75 25 78 20" stroke="#333" stroke-width="1" fill="none" opacity="0.6"/>
</svg>
